
<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickForge — Miniature YouTube AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#FF2D00;--dark:#090909;--dark2:#131313;--dark3:#1c1c1c;--white:#F0EBE1;--border:#222;}
body{background:var(--dark);color:var(--white);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

nav{background:rgba(9,9,9,.97);border-bottom:1px solid var(–border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
.logo{font-size:22px;font-weight:900;letter-spacing:3px;color:var(–white);}
.logo b{color:var(–red);}
.badge{font-size:9px;letter-spacing:2px;color:var(–red);border:1px solid rgba(255,45,0,.25);padding:4px 9px;border-radius:2px;text-transform:uppercase;}

.wrap{max-width:680px;margin:0 auto;padding:32px 16px;}

.eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(255,45,0,.09);border:1px solid rgba(255,45,0,.2);color:var(–red);padding:5px 12px;border-radius:2px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:16px;}
.dot{width:5px;height:5px;background:var(–red);border-radius:50%;animation:pulse 1.4s infinite;}
h1{font-weight:900;font-size:clamp(46px,12vw,78px);line-height:.88;margin-bottom:14px;}
.outline{color:transparent;-webkit-text-stroke:1.5px var(–red);}
.sub{color:rgba(240,235,225,.45);font-size:14px;font-weight:300;line-height:1.65;margin-bottom:32px;}

.card{background:var(–dark2);border:1px solid var(–border);border-radius:10px;padding:22px;margin-bottom:20px;}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,235,225,.35);margin-bottom:7px;}
input,textarea,select{width:100%;background:var(–dark);border:1px solid var(–border);border-radius:6px;color:var(–white);font-family:inherit;font-size:14px;padding:11px 13px;outline:none;transition:border-color .2s;margin-bottom:16px;}
input:focus,textarea:focus,select:focus{border-color:rgba(255,45,0,.4);}
textarea{height:68px;resize:none;line-height:1.55;}
select option{background:var(–dark2);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0;}
.row2 input,.row2 select{margin-bottom:0;}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0 22px;}
.chip{padding:6px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;background:transparent;border:1px solid var(–border);color:rgba(240,235,225,.4);font-family:inherit;transition:all .15s;}
.chip.on{background:rgba(255,45,0,.13);border-color:var(–red);color:var(–red);}

.status{display:none;align-items:center;gap:10px;background:var(–dark);border:1px solid var(–border);border-radius:6px;padding:12px 15px;margin-bottom:14px;font-size:11px;color:#FFD600;}
.status.show{display:flex;}
.s-spin{width:13px;height:13px;border:2px solid rgba(255,214,0,.2);border-top-color:#FFD600;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}

.errbox{display:none;background:rgba(255,45,0,.07);border:1px solid rgba(255,45,0,.25);border-radius:6px;padding:12px 15px;margin-bottom:14px;color:#ff6b55;font-size:12px;line-height:1.5;}
.errbox.show{display:block;}

.genbtn{width:100%;background:var(–red);color:#fff;border:none;padding:15px;border-radius:6px;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;box-shadow:0 0 40px rgba(255,45,0,.15);transition:background .2s;}
.genbtn:hover:not(:disabled){background:#d92400;}
.genbtn:disabled{opacity:.5;cursor:not-allowed;background:#3a0d00;}
.b-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}

/* RESULTS */
#results{display:none;}
#results.show{display:block;animation:fadeIn .4s ease;}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.rt{font-weight:800;font-size:18px;}
.rbtn{background:transparent;color:var(–red);border:1px solid rgba(255,45,0,.3);padding:7px 14px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.rbtn:hover{background:rgba(255,45,0,.08);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tc{background:var(–dark2);border:1px solid var(–border);border-radius:8px;overflow:hidden;transition:border-color .2s;}
.tc:hover{border-color:#333;}
.ti{width:100%;aspect-ratio:16/9;background:var(–dark3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ti img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s;display:block;}
.ti img.ok{opacity:1;}
.tl{display:flex;flex-direction:column;align-items:center;gap:8px;position:absolute;}
.tr{width:20px;height:20px;border:2px solid #282828;border-top-color:var(–red);border-radius:50%;animation:spin .8s linear infinite;}
.tt{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#333;}
.info{padding:11px 13px;}
.itag{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(–red);margin-bottom:5px;}
.ifoc{font-size:11px;color:rgba(240,235,225,.38);line-height:1.4;margin-bottom:11px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.acts{display:flex;gap:6px;}
.aopen{flex:1;background:var(–dark);border:1px solid var(–border);color:var(–white);padding:7px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;text-align:center;text-decoration:none;font-family:inherit;}
.asave{flex:1;background:var(–red);border:none;color:#fff;padding:7px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;text-align:center;text-decoration:none;font-family:inherit;}

.ok-bar{margin-top:12px;padding:11px 14px;background:rgba(93,186,111,.07);border:1px solid rgba(93,186,111,.18);border-radius:6px;font-size:11px;color:rgba(93,186,111,.8);}

footer{padding:24px 20px;border-top:1px solid var(–border);display:flex;justify-content:space-between;align-items:center;max-width:680px;margin:0 auto;}
.fl{font-weight:900;font-size:16px;letter-spacing:3px;}
.fl b{color:var(–red);}
.fn{font-size:8px;letter-spacing:.15em;color:#222;}

input::placeholder,textarea::placeholder{color:rgba(240,235,225,.18);}
@media(max-width:460px){.grid{grid-template-columns:1fr;}.row2{grid-template-columns:1fr;}}
</style>

</head>
<body>

    <input type="text" id="title" placeholder="Es: Ho guadagnato 10.000€ con questo metodo segreto" onkeydown="if(event.key==='Enter')gen()">

```

<textarea id="desc" placeholder="Target audience, tono, dettagli..."></textarea>

<script>
document.querySelectorAll('.chip').forEach(c => c.onclick = () => c.classList.toggle('on'));

const $ = id => document.getElementById(id);

function setLoad(on) {
  $('gbtn').disabled = on;
  $('btxt').textContent = on ? 'Generazione...' : '✦ Genera Miniature →';
  $('bspin').style.display = on ? 'inline-block' : 'none';
}
function setSt(txt) {
  $('stxt').textContent = txt;
  $('status').classList.toggle('show', !!txt);
}
function setErr(msg) {
  $('err').textContent = msg;
  $('err').classList.toggle('show', !!msg);
}

// Build 4 hardcoded prompts locally — always works, no API needed
function localPrompts(title, mood, styleStr) {
  return [
    {
      n: 'Volto Drammatico',
      f: 'Closeup estremo con emozione intensa',
      p: `dramatic extreme closeup portrait face, intense ${mood} expression, tears or sweat, ${styleStr} cinematic lighting, rim light, deep shadows, shallow depth of field, dark moody background, highly detailed skin texture, related to "${title}", youtube thumbnail 16:9 ultra high contrast 8k professional`
    },
    {
      n: 'Scenica Epica',
      f: 'Ambientazione vasta e atmosferica',
      p: `epic wide angle cinematic environment, dramatic atmospheric lighting, golden hour or stormy sky, vast landscape symbolizing "${title}", ${styleStr} photography, god rays, ${mood} atmosphere, youtube thumbnail 16:9 ultra high contrast 8k professional`
    },
    {
      n: 'Concettuale',
      f: 'Metafora visiva simbolica e potente',
      p: `powerful symbolic concept art, visual metaphor for "${title}", surreal ${styleStr} composition, striking dramatic imagery, ${mood} feeling, bold colors high saturation, dynamic composition, youtube thumbnail 16:9 ultra high contrast 8k professional`
    },
    {
      n: 'Action Dinamica',
      f: 'Energia esplosiva e movimento',
      p: `explosive dynamic action shot, ${mood} raw energy, motion blur speed lines, ${styleStr} style, dramatic impact moment, flying debris or sparks, intense movement representing "${title}", youtube thumbnail 16:9 ultra high contrast 8k professional`
    }
  ];
}

function imgUrl(prompt, i) {
  const seed = Math.floor(Math.random() * 999999);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1280&height=720&seed=${seed}&nologo=true&enhance=true&model=flux`;
}

function makeCard(v, i) {
  const url = imgUrl(v.p, i);
  const div = document.createElement('div');
  div.className = 'tc';
  div.innerHTML = `
    <div class="ti">
      <div class="tl" id="ld${i}"><div class="tr"></div><div class="tt">Rendering...</div></div>
      <img id="img${i}" src="${url}" alt="${v.n}"
        onload="this.classList.add('ok');document.getElementById('ld${i}').style.display='none'"
        onerror="retryImg(${i},'${encodeURIComponent(v.p)}')" />
    </div>
    <div class="info">
      <div class="itag">V${i+1} — ${v.n}</div>
      <div class="ifoc">${v.f}</div>
      <div class="acts">
        <a class="aopen" href="${url}" target="_blank" rel="noopener">↗ Apri</a>
        <a class="asave" href="${url}" download="miniatura-${i+1}.jpg">⬇ Salva</a>
      </div>
    </div>`;
  return { div, url };
}

// Retry with a different seed if image fails
const retries = {};
function retryImg(i, encodedPrompt) {
  retries[i] = (retries[i] || 0) + 1;
  if (retries[i] > 3) {
    const ld = document.getElementById('ld' + i);
    if (ld) ld.innerHTML = '<div style="font-size:9px;color:#ff6b55;text-align:center;padding:8px">Errore caricamento.<br>Clicca ↗ Apri</div>';
    return;
  }
  const seed = Math.floor(Math.random() * 999999);
  const newUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1280&height=720&seed=${seed}&nologo=true&enhance=true&model=flux`;
  const img = document.getElementById('img' + i);
  if (img) {
    setTimeout(() => { img.src = newUrl; }, retries[i] * 2000);
  }
}

async function gen() {
  const title = $('title').value.trim();
  const desc  = $('desc').value.trim();
  const mood  = $('mood').value;
  const styles = [...document.querySelectorAll('.chip.on')].map(c => c.dataset.s);
  const styleStr = styles.length ? styles.join(', ') : 'cinematic';

  if (!title) { setErr('⚠ Inserisci il titolo del video!'); return; }

  setErr(''); setLoad(true); setSt('Costruzione prompt ottimizzati...');
  $('results').classList.remove('show');

  // Small delay so UI updates
  await new Promise(r => setTimeout(r, 100));

  try {
    const vars = localPrompts(title, mood, styleStr);

    setSt('Avvio rendering immagini Pollinations...');
    await new Promise(r => setTimeout(r, 200));

    const grid = $('grid');
    grid.innerHTML = '';
    retries.__proto__ = null;

    vars.forEach((v, i) => {
      const { div } = makeCard(v, i);
      grid.appendChild(div);
    });

    $('okbar').textContent = `✓ 4 miniature avviate — le immagini impiegano 20–60 sec a caricarsi. Se una non carica, clicca "↗ Apri".`;
    $('results').classList.add('show');
    $('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(e) {
    setErr('Errore: ' + e.message);
  } finally {
    setLoad(false);
    setSt('');
  }
}
</script>

</body>
