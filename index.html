<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickForge — Miniature YouTube AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#FF2D00;--dark:#090909;--dark2:#131313;--dark3:#1c1c1c;--white:#F0EBE1;--border:#222;}
body{background:var(--dark);color:var(--white);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

nav{background:rgba(9,9,9,.97);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;backdrop-filter:blur(20px);}
.logo{font-size:22px;font-weight:900;letter-spacing:3px;color:var(--white);}
.logo b{color:var(--red);}
.badge{font-size:9px;letter-spacing:2px;color:var(--red);border:1px solid rgba(255,45,0,.25);padding:4px 9px;border-radius:2px;text-transform:uppercase;}

.wrap{max-width:680px;margin:0 auto;padding:32px 16px;}

.eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(255,45,0,.09);border:1px solid rgba(255,45,0,.2);color:var(--red);padding:5px 12px;border-radius:2px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:16px;}
.dot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:pulse 1.4s infinite;}
h1{font-weight:900;font-size:clamp(46px,12vw,78px);line-height:.88;margin-bottom:14px;}
.outline{color:transparent;-webkit-text-stroke:1.5px var(--red);}
.sub{color:rgba(240,235,225,.45);font-size:14px;font-weight:300;line-height:1.65;margin-bottom:32px;}

.card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:20px;}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,235,225,.35);margin-bottom:7px;}
input,textarea,select{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:6px;color:var(--white);font-family:inherit;font-size:14px;padding:11px 13px;outline:none;transition:border-color .2s;margin-bottom:16px;}
input:focus,textarea:focus,select:focus{border-color:rgba(255,45,0,.4);}
textarea{height:68px;resize:none;line-height:1.55;}
select option{background:var(--dark2);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.row2 select{margin-bottom:0;}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0 22px;}
.chip{padding:6px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;background:transparent;border:1px solid var(--border);color:rgba(240,235,225,.4);font-family:inherit;transition:all .15s;}
.chip.on{background:rgba(255,45,0,.13);border-color:var(--red);color:var(--red);}

.status{display:none;align-items:center;gap:10px;background:var(--dark);border:1px solid var(--border);border-radius:6px;padding:12px 15px;margin-bottom:14px;font-size:12px;color:#FFD600;}
.status.show{display:flex;}
.s-spin{width:13px;height:13px;border:2px solid rgba(255,214,0,.2);border-top-color:#FFD600;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}

.errbox{display:none;background:rgba(255,45,0,.07);border:1px solid rgba(255,45,0,.25);border-radius:6px;padding:12px 15px;margin-bottom:14px;color:#ff6b55;font-size:12px;line-height:1.5;}
.errbox.show{display:block;}

.genbtn{width:100%;background:var(--red);color:#fff;border:none;padding:15px;border-radius:6px;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;box-shadow:0 0 40px rgba(255,45,0,.15);transition:background .2s;}
.genbtn:hover:not(:disabled){background:#d92400;}
.genbtn:disabled{opacity:.5;cursor:not-allowed;}
.b-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}

/* Progress bar */
.progress-wrap{display:none;margin-bottom:14px;}
.progress-wrap.show{display:block;}
.progress-label{font-size:11px;color:rgba(240,235,225,.45);margin-bottom:8px;display:flex;justify-content:space-between;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .8s ease;width:0%;}

#results{display:none;}
#results.show{display:block;animation:fadeIn .4s ease;}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.rt{font-weight:800;font-size:18px;}
.rbtn{background:transparent;color:var(--red);border:1px solid rgba(255,45,0,.3);padding:7px 14px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.rbtn:hover{background:rgba(255,45,0,.08);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tc{background:var(--dark2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s,transform .2s;}
.tc:hover{border-color:#333;transform:translateY(-2px);}
.ti{width:100%;aspect-ratio:16/9;background:var(--dark3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ti img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s;display:block;}
.ti img.ok{opacity:1;}
.tloader{display:flex;flex-direction:column;align-items:center;gap:8px;position:absolute;z-index:1;}
.tring{width:20px;height:20px;border:2px solid #282828;border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
.ttxt{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#333;}
.tqueue{font-size:9px;color:#555;letter-spacing:.1em;}

.info{padding:11px 13px;}
.itag{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:5px;}
.ifoc{font-size:11px;color:rgba(240,235,225,.38);line-height:1.4;margin-bottom:11px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.acts{display:flex;gap:6px;}
.aopen{flex:1;background:var(--dark);border:1px solid var(--border);color:var(--white);padding:7px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;text-align:center;text-decoration:none;font-family:inherit;transition:border-color .2s;}
.aopen:hover{border-color:#444;}
.asave{flex:1;background:var(--red);border:none;color:#fff;padding:7px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;text-align:center;text-decoration:none;font-family:inherit;}

.ok-bar{margin-top:12px;padding:11px 14px;background:rgba(93,186,111,.07);border:1px solid rgba(93,186,111,.18);border-radius:6px;font-size:11px;color:rgba(93,186,111,.8);}

input::placeholder,textarea::placeholder{color:rgba(240,235,225,.18);}
@media(max-width:460px){.grid{grid-template-columns:1fr;}.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <div class="logo"><b>Click</b>Forge</div>
  <div class="badge">AI Thumbnails</div>
</nav>

<div class="wrap">
  <div class="eyebrow"><span class="dot"></span> Pollinations AI · Free · No signup</div>
  <h1>Miniature<br><span class="outline">Pazzesche</span><br>in 10 sec</h1>
  <p class="sub">Descrivi il video → AI costruisce 4 prompt cinematografici → genera le immagini 16:9 YouTube-ready.</p>

  <div class="card">
    <label class="lbl">Titolo del Video *</label>
    <input type="text" id="title" placeholder="Es: Ho comprato un jet privato!" onkeydown="if(event.key==='Enter')gen()">

    <label class="lbl">Descrizione (opzionale)</label>
    <textarea id="desc" placeholder="Target audience, tono, dettagli importanti..."></textarea>

    <div class="row2">
      <div>
        <label class="lbl">Categoria</label>
        <select id="cat">
          <option value="general">Generico</option>
          <option value="finance">Finanza / Business</option>
          <option value="tech">Tech / AI</option>
          <option value="gaming">Gaming</option>
          <option value="lifestyle">Lifestyle / Vlog</option>
          <option value="fitness">Fitness / Salute</option>
          <option value="food">Cucina / Food</option>
          <option value="education">Tutorial</option>
          <option value="entertainment">Intrattenimento</option>
        </select>
      </div>
      <div>
        <label class="lbl">Mood</label>
        <select id="mood">
          <option value="shock">Shock / Sorpresa</option>
          <option value="curiosity">Curiosità intensa</option>
          <option value="excitement">Hype / Eccitazione</option>
          <option value="fear">Urgenza / Paura</option>
          <option value="inspiration">Ispirazione</option>
          <option value="humor">Divertimento</option>
        </select>
      </div>
    </div>

    <label class="lbl">Stile visivo</label>
    <div class="chips">
      <button class="chip on" data-s="cinematic">🎬 Cinematografico</button>
      <button class="chip" data-s="dramatic">⚡ Drammatico</button>
      <button class="chip" data-s="neon">🌆 Neon/Cyberpunk</button>
      <button class="chip" data-s="photorealistic">📸 Fotorealistico</button>
      <button class="chip" data-s="dark">🖤 Dark/Moody</button>
      <button class="chip" data-s="minimal">◻ Minimal</button>
      <button class="chip" data-s="retro">📼 Retro</button>
      <button class="chip" data-s="illustration">🎨 Illustrazione</button>
    </div>

    <div class="status" id="status"><span class="s-spin"></span><span id="stxt"></span></div>

    <div class="progress-wrap" id="progWrap">
      <div class="progress-label"><span id="progTxt">Generazione immagini...</span><span id="progNum">0/4</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>

    <div class="errbox" id="err"></div>

    <button class="genbtn" id="gbtn" onclick="gen()">
      <span id="btxt">✦ Genera Miniature →</span>
      <span class="b-spin" id="bspin"></span>
    </button>
  </div>

  <div id="results">
    <div class="rh">
      <span class="rt">Le tue miniature</span>
      <button class="rbtn" onclick="gen()">↻ Rigenera</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="ok-bar" id="okbar"></div>
  </div>

  <div style="margin-top:32px;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
    <div style="font-weight:900;font-size:16px;letter-spacing:3px;"><b style="color:var(--red)">Click</b>Forge</div>
    <div style="font-size:8px;letter-spacing:.15em;color:#222;">Pollinations AI · Free · No API key</div>
  </div>
</div>

<script>
document.querySelectorAll('.chip').forEach(c => c.onclick = () => c.classList.toggle('on'));
const $ = id => document.getElementById(id);

function setLoad(on) {
  $('gbtn').disabled = on;
  $('btxt').textContent = on ? 'Generazione...' : '✦ Genera Miniature →';
  $('bspin').style.display = on ? 'inline-block' : 'none';
}
function setSt(txt) {
  $('stxt').textContent = txt;
  $('status').classList.toggle('show', !!txt);
}
function setErr(msg) {
  $('err').textContent = msg;
  $('err').classList.toggle('show', !!msg);
}
function setProgress(done, total) {
  $('progWrap').classList.toggle('show', total > 0);
  $('progNum').textContent = done + '/' + total;
  $('progTxt').textContent = done < total ? `Immagine ${done+1} di ${total} in corso...` : 'Completato!';
  $('progFill').style.width = (done / total * 100) + '%';
}

function buildPrompts(title, mood, styleStr) {
  return [
    {
      n: 'Volto Drammatico',
      f: 'Closeup estremo con emozione intensa',
      p: `dramatic extreme closeup portrait, intense ${mood} expression, ${styleStr} cinematic lighting, rim light, deep shadows, shallow depth of field, dark background, representing "${title}", youtube thumbnail 16:9 ultra high contrast 8k professional no text`
    },
    {
      n: 'Scenica Epica',
      f: 'Ambientazione vasta e atmosferica',
      p: `epic wide angle cinematic landscape, dramatic atmospheric lighting, representing "${title}", ${styleStr} photography, ${mood} atmosphere, stunning composition, youtube thumbnail 16:9 ultra high contrast 8k professional no text`
    },
    {
      n: 'Concettuale',
      f: 'Metafora visiva simbolica e potente',
      p: `powerful symbolic concept art, visual metaphor for "${title}", surreal ${styleStr} composition, ${mood} feeling, bold colors, striking imagery, youtube thumbnail 16:9 ultra high contrast 8k professional no text`
    },
    {
      n: 'Action Dinamica',
      f: 'Energia esplosiva e movimento',
      p: `explosive dynamic action shot, ${mood} energy, motion blur, ${styleStr} style, powerful impact, representing "${title}", youtube thumbnail 16:9 ultra high contrast 8k professional no text`
    }
  ];
}

// Load one image at a time with a delay between each
function loadImageSequentially(variants, index, onDone) {
  if (index >= variants.length) { onDone(); return; }

  setProgress(index, variants.length);

  const v = variants[index];
  const seed = Math.floor(Math.random() * 999999);
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(v.p)}?width=1280&height=720&seed=${seed}&nologo=true&enhance=true&model=flux`;

  // Update card with real URL
  const imgEl = $('img' + index);
  const openEl = $('open' + index);
  const saveEl = $('save' + index);
  if (imgEl) imgEl.src = url;
  if (openEl) openEl.href = url;
  if (saveEl) saveEl.href = url;

  // Store url for retry
  v._url = url;
  v._seed = seed;

  const img = new Image();
  img.onload = () => {
    if (imgEl) imgEl.classList.add('ok');
    const ld = $('ld' + index);
    if (ld) ld.style.display = 'none';
    setProgress(index + 1, variants.length);
    // Wait 3 seconds before next request to respect rate limit
    setTimeout(() => loadImageSequentially(variants, index + 1, onDone), 3000);
  };
  img.onerror = () => {
    // On error, wait longer and retry once
    const ld = $('ld' + index);
    if (ld) ld.innerHTML = '<div class="tring"></div><div class="tqueue">Retry in 5s...</div>';
    setTimeout(() => {
      const seed2 = Math.floor(Math.random() * 999999);
      const url2 = `https://image.pollinations.ai/prompt/${encodeURIComponent(v.p)}?width=1280&height=720&seed=${seed2}&nologo=true&enhance=true&model=flux`;
      if (imgEl) imgEl.src = url2;
      if (openEl) openEl.href = url2;
      if (saveEl) saveEl.href = url2;
      imgEl.onload = () => {
        imgEl.classList.add('ok');
        if (ld) ld.style.display = 'none';
        setProgress(index + 1, variants.length);
        setTimeout(() => loadImageSequentially(variants, index + 1, onDone), 3000);
      };
      imgEl.onerror = () => {
        if (ld) ld.innerHTML = '<div style="font-size:9px;color:#666;text-align:center">Clicca ↗ Apri</div>';
        setProgress(index + 1, variants.length);
        setTimeout(() => loadImageSequentially(variants, index + 1, onDone), 3000);
      };
    }, 5000);
  };
  img.src = url;
}

async function gen() {
  const title = $('title').value.trim();
  const desc  = $('desc').value.trim();
  const mood  = $('mood').value;
  const styles = [...document.querySelectorAll('.chip.on')].map(c => c.dataset.s);
  const styleStr = styles.length ? styles.join(', ') : 'cinematic';

  if (!title) { setErr('⚠ Inserisci il titolo del video!'); return; }

  setErr(''); setLoad(true); setSt('Costruzione prompt ottimizzati...');
  $('results').classList.remove('show');
  $('progWrap').classList.remove('show');

  await new Promise(r => setTimeout(r, 150));

  const variants = buildPrompts(title + (desc ? ' — ' + desc : ''), mood, styleStr);

  // Build skeleton cards first (no image src yet)
  const grid = $('grid');
  grid.innerHTML = '';
  variants.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'tc';
    div.innerHTML = `
      <div class="ti">
        <div class="tloader" id="ld${i}"><div class="tring"></div><div class="ttxt">In coda...</div></div>
        <img id="img${i}" alt="${v.n}" onload="this.classList.add('ok');document.getElementById('ld${i}').style.display='none'" />
      </div>
      <div class="info">
        <div class="itag">V${i+1} — ${v.n}</div>
        <div class="ifoc">${v.f}</div>
        <div class="acts">
          <a class="aopen" id="open${i}" href="#" target="_blank" rel="noopener">↗ Apri</a>
          <a class="asave" id="save${i}" href="#" download="miniatura-${i+1}.jpg">⬇ Salva</a>
        </div>
      </div>`;
    grid.appendChild(div);
  });

  $('results').classList.add('show');
  $('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  setSt('');

  // Load images one by one
  loadImageSequentially(variants, 0, () => {
    setLoad(false);
    $('progWrap').classList.remove('show');
    $('okbar').textContent = '✓ Tutte le miniature generate! Clicca "↗ Apri" per vedere in full-res o "⬇ Salva" per scaricare.';
  });
}
</script>
</body>
</html>
